name: warm-magazine
description: 温暖杂志风，适合观点长文、个人表达、故事化技术文章。
palette:
  primary: "#b45309"
  primary_dark: "#92400e"
  accent: "#d97706"
  text: "#3f3f46"
  heading: "#292524"
  muted: "#78716c"
  border: "#e7e5e4"
  surface: "#fff7ed"
  surface_alt: "#fffbeb"
  code_bg: "#292524"
  code_text: "#f5f5f4"
layout:
  radius: "14px"
  body_font_size: "16px"
  line_height: "1.9"
