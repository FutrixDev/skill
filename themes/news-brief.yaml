  faq:
    label: "读者会问"
    emoji: "🙋"
    background: "#faf5ff"
    border_color: "#a855f7"
    title_color: "#7e22ce"
  resources:
    label: "相关链接"
    emoji: "🔎"
    background: "#eff6ff"
    border_color: "#60a5fa"
    title_color: "#1d4ed8"
  comparison:
    label: "对比速览"
