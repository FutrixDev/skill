    title_color: "#9a3412"
  steps:
    label: "行动顺序"
    emoji: "🧭"
    background: "#eef2ff"
    border_color: "#6366f1"
    title_color: "#4338ca"
  checklist:
    label: "编辑清单"
    emoji: "☑️"
    background: "#f0fdf4"
    border_color: "#22c55e"
